<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>タスク管理ツール — Demo</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Sans:ital,wght@0,300;0,400;1,300&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0e0e0c;
      --surface: #161614;
      --surface2: #1e1e1b;
      --border: rgba(255,255,255,0.07);
      --border-md: rgba(255,255,255,0.14);
      --text: #edece4;
      --text-muted: #6b6a62;
      --text-dim: #3a3a36;
      --accent: #c8f060;
      --accent-dim: rgba(200,240,96,0.12);
      --accent-glow: rgba(200,240,96,0.25);
      --danger: #ff6b6b;
      --danger-dim: rgba(255,107,107,0.12);
      --tag-todo: #3a3a36;
      --tag-doing: rgba(200,240,96,0.15);
      --tag-done: rgba(255,255,255,0.05);
    }

    html, body { height: 100%; }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      font-size: 14px;
      line-height: 1.6;
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }

    /* ── HEADER ── */
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 1.5rem;
      height: 52px;
      border-bottom: 0.5px solid var(--border);
      flex-shrink: 0;
    }

    .header-logo {
      font-family: 'Syne', sans-serif;
      font-weight: 800;
      font-size: 13px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--accent);
    }

    .header-badge {
      font-size: 10px;
      letter-spacing: 0.08em;
      padding: 3px 9px;
      border-radius: 100px;
      background: var(--accent-dim);
      color: var(--accent);
      border: 0.5px solid rgba(200,240,96,0.3);
    }

    /* ── LAYOUT ── */
    .main {
      display: flex;
      flex: 1;
      overflow: hidden;
    }

    /* ── SIDEBAR ── */
    .sidebar {
      width: 200px;
      flex-shrink: 0;
      border-right: 0.5px solid var(--border);
      padding: 1.25rem 0;
      display: flex;
      flex-direction: column;
      gap: 0.25rem;
    }

    .sidebar-label {
      font-size: 10px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--text-dim);
      padding: 0 1.25rem;
      margin-bottom: 0.25rem;
      margin-top: 0.75rem;
    }

    .sidebar-label:first-child { margin-top: 0; }

    .sidebar-item {
      display: flex;
      align-items: center;
      gap: 9px;
      padding: 7px 1.25rem;
      font-size: 13px;
      color: var(--text-muted);
      cursor: pointer;
      transition: color 0.15s, background 0.15s;
      border-radius: 0;
      user-select: none;
    }

    .sidebar-item:hover { color: var(--text); background: var(--surface); }

    .sidebar-item.active {
      color: var(--accent);
      background: var(--accent-dim);
    }

    .sidebar-item .icon { font-size: 13px; opacity: 0.7; }

    .sidebar-count {
      margin-left: auto;
      font-size: 10px;
      padding: 1px 6px;
      border-radius: 100px;
      background: var(--surface2);
      color: var(--text-muted);
    }

    /* ── CONTENT ── */
    .content {
      flex: 1;
      overflow-y: auto;
      padding: 1.5rem;
      display: flex;
      flex-direction: column;
      gap: 1.25rem;
    }

    .content-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
    }

    .content-title {
      font-family: 'Syne', sans-serif;
      font-weight: 700;
      font-size: 18px;
      letter-spacing: -0.3px;
    }

    /* ── INPUT ROW ── */
    .input-row {
      display: flex;
      gap: 8px;
    }

    .task-input {
      flex: 1;
      background: var(--surface);
      border: 0.5px solid var(--border-md);
      border-radius: 6px;
      padding: 9px 14px;
      font-family: 'DM Sans', sans-serif;
      font-size: 13px;
      color: var(--text);
      outline: none;
      transition: border-color 0.2s;
    }

    .task-input::placeholder { color: var(--text-dim); }
    .task-input:focus { border-color: var(--accent); }

    .priority-select {
      background: var(--surface);
      border: 0.5px solid var(--border-md);
      border-radius: 6px;
      padding: 9px 10px;
      font-family: 'DM Sans', sans-serif;
      font-size: 12px;
      color: var(--text-muted);
      outline: none;
      cursor: pointer;
    }

    .add-btn {
      background: var(--accent);
      color: #0e0e0c;
      border: none;
      border-radius: 6px;
      padding: 9px 18px;
      font-family: 'Syne', sans-serif;
      font-weight: 700;
      font-size: 12px;
      letter-spacing: 0.06em;
      cursor: pointer;
      transition: opacity 0.2s;
      white-space: nowrap;
    }

    .add-btn:hover { opacity: 0.85; }

    /* ── KANBAN COLUMNS ── */
    .kanban {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
      flex: 1;
    }

    .column {
      background: var(--surface);
      border: 0.5px solid var(--border);
      border-radius: 8px;
      display: flex;
      flex-direction: column;
      min-height: 300px;
      overflow: hidden;
    }

    .column-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 14px;
      border-bottom: 0.5px solid var(--border);
    }

    .column-title-row {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .column-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
    }

    .column-dot.todo  { background: var(--text-dim); }
    .column-dot.doing { background: var(--accent); box-shadow: 0 0 6px var(--accent-glow); }
    .column-dot.done  { background: #4a4a44; }

    .column-title {
      font-family: 'Syne', sans-serif;
      font-weight: 700;
      font-size: 11px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }

    .column-count {
      font-size: 10px;
      color: var(--text-muted);
      background: var(--surface2);
      padding: 2px 7px;
      border-radius: 100px;
    }

    .column-body {
      flex: 1;
      padding: 10px;
      display: flex;
      flex-direction: column;
      gap: 7px;
      overflow-y: auto;
    }

    /* ── TASK CARD ── */
    .task-card {
      background: var(--bg);
      border: 0.5px solid var(--border);
      border-radius: 6px;
      padding: 10px 12px;
      display: flex;
      flex-direction: column;
      gap: 7px;
      cursor: grab;
      transition: border-color 0.2s, transform 0.15s, box-shadow 0.15s;
      animation: cardIn 0.25s ease both;
      user-select: none;
    }

    .task-card:hover {
      border-color: var(--border-md);
      transform: translateY(-1px);
      box-shadow: 0 4px 16px rgba(0,0,0,0.3);
    }

    .task-card.dragging {
      opacity: 0.5;
      transform: scale(0.97);
      cursor: grabbing;
    }

    .task-card.drag-over {
      border-color: var(--accent);
      box-shadow: 0 0 0 1px var(--accent);
    }

    @keyframes cardIn {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .task-top {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 6px;
    }

    .task-text {
      font-size: 13px;
      line-height: 1.5;
      flex: 1;
    }

    .task-text.done-text {
      text-decoration: line-through;
      color: var(--text-muted);
    }

    .task-delete {
      background: none;
      border: none;
      color: var(--text-dim);
      cursor: pointer;
      font-size: 14px;
      padding: 0;
      line-height: 1;
      transition: color 0.15s;
      flex-shrink: 0;
    }

    .task-delete:hover { color: var(--danger); }

    .task-bottom {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .priority-badge {
      font-size: 10px;
      letter-spacing: 0.06em;
      padding: 2px 7px;
      border-radius: 100px;
    }

    .priority-badge.high {
      background: var(--danger-dim);
      color: var(--danger);
    }

    .priority-badge.mid {
      background: rgba(255,180,60,0.12);
      color: #ffb43c;
    }

    .priority-badge.low {
      background: var(--surface2);
      color: var(--text-muted);
    }

    .task-date {
      font-size: 10px;
      color: var(--text-dim);
      margin-left: auto;
    }

    /* ── MOVE BUTTONS ── */
    .task-actions {
      display: flex;
      gap: 4px;
    }

    .move-btn {
      font-size: 10px;
      padding: 2px 7px;
      border-radius: 4px;
      border: 0.5px solid var(--border-md);
      background: none;
      color: var(--text-muted);
      cursor: pointer;
      transition: background 0.15s, color 0.15s;
      letter-spacing: 0.04em;
    }

    .move-btn:hover { background: var(--surface2); color: var(--text); }

    /* ── EMPTY STATE ── */
    .empty-state {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 6px;
      padding: 2rem;
      color: var(--text-dim);
      font-size: 12px;
      letter-spacing: 0.04em;
    }

    .empty-icon { font-size: 1.5rem; opacity: 0.3; }

    /* ── SCROLLBAR ── */
    ::-webkit-scrollbar { width: 4px; height: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border-md); border-radius: 2px; }

    /* ── DEMO BANNER ── */
    .demo-bar {
      text-align: center;
      padding: 6px;
      font-size: 10px;
      letter-spacing: 0.1em;
      color: var(--text-dim);
      border-top: 0.5px solid var(--border);
      flex-shrink: 0;
    }
  </style>
</head>
<body>

  <header class="header">
    <span class="header-logo">TaskFlow</span>
    <span class="header-badge">DEMO</span>
  </header>

  <div class="main">
    <aside class="sidebar">
      <span class="sidebar-label">View</span>
      <div class="sidebar-item active" data-view="all">
        <span class="icon">◈</span> すべて
        <span class="sidebar-count" id="countAll">0</span>
      </div>
      <div class="sidebar-item" data-view="high">
        <span class="icon">↑</span> 高優先度
        <span class="sidebar-count" id="countHigh">0</span>
      </div>
      <div class="sidebar-item" data-view="done">
        <span class="icon">✓</span> 完了済み
        <span class="sidebar-count" id="countDone">0</span>
      </div>
      <span class="sidebar-label">Filter</span>
      <div class="sidebar-item" data-filter="all" id="filterAll">
        <span class="icon">⊙</span> すべて表示
      </div>
      <div class="sidebar-item" data-filter="high" id="filterHigh">
        <span class="icon">●</span> High のみ
      </div>
      <div class="sidebar-item" data-filter="mid" id="filterMid">
        <span class="icon">●</span> Mid のみ
      </div>
    </aside>

    <div class="content">
      <div class="content-header">
        <div class="content-title">タスクボード</div>
      </div>

      <div class="input-row">
        <input class="task-input" id="taskInput" type="text" placeholder="新しいタスクを入力…" maxlength="80" />
        <select class="priority-select" id="prioritySelect">
          <option value="high">↑ High</option>
          <option value="mid" selected>→ Mid</option>
          <option value="low">↓ Low</option>
        </select>
        <button class="add-btn" id="addBtn">+ 追加</button>
      </div>

      <div class="kanban">
        <div class="column" id="col-todo" data-status="todo">
          <div class="column-header">
            <div class="column-title-row">
              <div class="column-dot todo"></div>
              <span class="column-title">Todo</span>
            </div>
            <span class="column-count" id="cnt-todo">0</span>
          </div>
          <div class="column-body" id="body-todo"></div>
        </div>

        <div class="column" id="col-doing" data-status="doing">
          <div class="column-header">
            <div class="column-title-row">
              <div class="column-dot doing"></div>
              <span class="column-title">In Progress</span>
            </div>
            <span class="column-count" id="cnt-doing">0</span>
          </div>
          <div class="column-body" id="body-doing"></div>
        </div>

        <div class="column" id="col-done" data-status="done">
          <div class="column-header">
            <div class="column-title-row">
              <div class="column-dot done"></div>
              <span class="column-title">Done</span>
            </div>
            <span class="column-count" id="cnt-done">0</span>
          </div>
          <div class="column-body" id="body-done"></div>
        </div>
      </div>
    </div>
  </div>

  <div class="demo-bar">This is a demo — data is not saved</div>

  <script>
    const STATUSES = ['todo','doing','done'];
    let tasks = [
      { id: 1, text: 'ポートフォリオサイトのデザイン確認', priority: 'high', status: 'doing', date: today() },
      { id: 2, text: 'APIドキュメントの整備', priority: 'mid', status: 'todo', date: today() },
      { id: 3, text: 'ユーザーインタビューの日程調整', priority: 'low', status: 'todo', date: today() },
      { id: 4, text: 'Supabase スキーマ設計', priority: 'high', status: 'done', date: today() },
      { id: 5, text: 'CI/CD パイプラインの構築', priority: 'mid', status: 'done', date: today() },
    ];
    let nextId = 10;
    let dragId = null;
    let currentFilter = 'all';

    function today() {
      return new Date().toLocaleDateString('ja-JP',{month:'short',day:'numeric'});
    }

    function render() {
      const filtered = currentFilter === 'all'
        ? tasks
        : tasks.filter(t => t.priority === currentFilter);

      STATUSES.forEach(status => {
        const body = document.getElementById('body-' + status);
        const cnt  = document.getElementById('cnt-' + status);
        const cols = filtered.filter(t => t.status === status);
        cnt.textContent = cols.length;

        body.innerHTML = '';
        if (cols.length === 0) {
          body.innerHTML = `<div class="empty-state"><span class="empty-icon">○</span>なし</div>`;
          return;
        }

        cols.forEach(task => {
          const card = document.createElement('div');
          card.className = 'task-card';
          card.dataset.id = task.id;
          card.draggable = true;

          const prevStatus = STATUSES[STATUSES.indexOf(task.status) - 1];
          const nextStatus = STATUSES[STATUSES.indexOf(task.status) + 1];

          card.innerHTML = `
            <div class="task-top">
              <span class="task-text ${task.status === 'done' ? 'done-text' : ''}">${esc(task.text)}</span>
              <button class="task-delete" data-id="${task.id}" title="削除">×</button>
            </div>
            <div class="task-bottom">
              <span class="priority-badge ${task.priority}">${task.priority.toUpperCase()}</span>
              <div class="task-actions">
                ${prevStatus ? `<button class="move-btn" data-id="${task.id}" data-to="${prevStatus}">← ${labelOf(prevStatus)}</button>` : ''}
                ${nextStatus ? `<button class="move-btn" data-id="${task.id}" data-to="${nextStatus}">${labelOf(nextStatus)} →</button>` : ''}
              </div>
              <span class="task-date">${task.date}</span>
            </div>`;

          // Drag events
          card.addEventListener('dragstart', () => {
            dragId = task.id;
            setTimeout(() => card.classList.add('dragging'), 0);
          });
          card.addEventListener('dragend', () => {
            dragId = null;
            card.classList.remove('dragging');
          });

          body.appendChild(card);
        });
      });

      // Column drop zones
      STATUSES.forEach(status => {
        const body = document.getElementById('body-' + status);
        body.addEventListener('dragover', e => {
          e.preventDefault();
          body.querySelectorAll('.task-card').forEach(c => c.classList.remove('drag-over'));
        });
        body.addEventListener('drop', e => {
          e.preventDefault();
          if (dragId != null) {
            const t = tasks.find(t => t.id === dragId);
            if (t) { t.status = status; render(); }
          }
        });
      });

      // Button events
      document.querySelectorAll('.task-delete').forEach(btn => {
        btn.addEventListener('click', () => {
          tasks = tasks.filter(t => t.id !== +btn.dataset.id);
          render();
        });
      });

      document.querySelectorAll('.move-btn').forEach(btn => {
        btn.addEventListener('click', () => {
          const t = tasks.find(t => t.id === +btn.dataset.id);
          if (t) { t.status = btn.dataset.to; render(); }
        });
      });

      // Sidebar counts
      document.getElementById('countAll').textContent  = tasks.length;
      document.getElementById('countHigh').textContent = tasks.filter(t => t.priority === 'high').length;
      document.getElementById('countDone').textContent = tasks.filter(t => t.status  === 'done').length;
    }

    function labelOf(s) { return s === 'todo' ? 'Todo' : s === 'doing' ? 'Doing' : 'Done'; }
    function esc(s) { return s.replace(/[&<>"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }

    // Add task
    document.getElementById('addBtn').addEventListener('click', addTask);
    document.getElementById('taskInput').addEventListener('keydown', e => {
      if (e.key === 'Enter') addTask();
    });

    function addTask() {
      const input = document.getElementById('taskInput');
      const text = input.value.trim();
      if (!text) return;
      tasks.unshift({ id: nextId++, text, priority: document.getElementById('prioritySelect').value, status: 'todo', date: today() });
      input.value = '';
      render();
    }

    // Sidebar nav
    document.querySelectorAll('.sidebar-item[data-filter]').forEach(item => {
      item.addEventListener('click', () => {
        currentFilter = item.dataset.filter;
        document.querySelectorAll('.sidebar-item[data-filter]').forEach(i => i.classList.remove('active'));
        item.classList.add('active');
        render();
      });
    });

    document.querySelectorAll('.sidebar-item[data-view]').forEach(item => {
      item.addEventListener('click', () => {
        document.querySelectorAll('.sidebar-item[data-view]').forEach(i => i.classList.remove('active'));
        item.classList.add('active');
        const v = item.dataset.view;
        currentFilter = (v === 'high') ? 'high' : (v === 'done') ? '__done__' : 'all';
        if (v === 'done') {
          // special: show all columns but filter by status
          currentFilter = 'all';
        }
        render();
      });
    });

    render();
  </script>
</body>
</html>
